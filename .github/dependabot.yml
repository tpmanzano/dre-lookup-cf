# Dependabot config — npm + GitHub Actions
#
# Watches npm dependencies for security updates; watches GitHub Actions
# workflows for action-version drift.
#
# Schedule: weekly Monday — bundles updates; avoids PR storm.

version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: scope
    labels:
      - dependencies
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
      include: scope
    labels:
      - dependencies
      - ci
